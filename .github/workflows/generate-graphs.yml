name: Generate Arcade & 3D Graphs

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # manual run button
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # 1) Arcade games (Pac-Man + Breakout) -> dist/
      - name: Generate arcade contribution graphs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Comma-separated list of games to generate.
          games: 'pacman,breakout'

      # 2) 3D contribution graph -> profile-3d-contrib/
      - name: Generate 3D graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: aryabagde

      - name: Move 3D graph into dist
        run: |
          mkdir -p dist/profile-3d-contrib
          cp profile-3d-contrib/*.svg dist/profile-3d-contrib/ || true
          ls -R dist

      # 3) Publish everything to the "output" branch
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
